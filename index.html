<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>MyVitalPal v3.2 - VitalAI + Ask Atom</title>\n  <link rel="manifest" href="manifest.json">\n  <meta name="theme-color" content="#00cc66">\n  <style>\n    /* v3.2 styles */\n    #key-input { position: fixed; top: 10px; right: 10px; padding: 8px; border-radius: 5px; z-index: 1001; background: white; }\n    .ai-status { position: fixed; top: 10px; left: 10px; background: #00cc66; color: white; padding: 5px 10px; border-radius: 20px; }\n    #ask-atom { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; background: linear-gradient(45deg, #ff6b35, #f7931e); color: white; border: none; border-radius: 50px; z-index: 1001; font-weight: bold; box-shadow: 0 6px 20px rgba(255,107,53,0.4); cursor: pointer; }\n    #ask-atom:hover { transform: scale(1.05); }\n  </style>\n</head>\n<body>\n  <!-- v3.2 Ask Atom integration -->\n  <input id="key-input" placeholder="sk-proj- OpenAI key" onblur="saveKey()">\n  <div id="ai-status" class="ai-status" style="display:none;">AI + Atom Ready 🚀</div>\n  <button id="ask-atom">Ask Atom 🌍</button>\n\n  <script>\n    let apiKey = localStorage.getItem('openai_key') || '';\n    if (apiKey) {\n      document.getElementById('ai-status').style.display = 'block';\n    }\n\n    function saveKey() {\n      apiKey = document.getElementById('key-input').value;\n      if (apiKey.startsWith('sk-')) {\n        localStorage.setItem('openai_key', apiKey);\n        document.getElementById('ai-status').style.display = 'block';\n      }\n    }\n\n    async function sendAgent() {\n      const input = document.getElementById('chat-input');\n      const msg = input.value;\n      const messages = document.getElementById('chat-messages');\n      messages.innerHTML += `<div>You: ${msg}</div>`;\n      input.value = '';\n      if (!apiKey) {\n        messages.innerHTML += '<div>Agent: Add key top right!</div>';\n        shareToAtom('', msg);\n        return;\n      }\n      try {\n        const resp = await fetch('https://api.openai.com/v1/chat/completions', {\n          method: 'POST',\n          headers: {\n            'Authorization': `Bearer ${apiKey}`,\n            'Content-Type': 'application/json'\n          },\n          body: JSON.stringify({\n            model: 'gpt-4o-mini',\n            messages: [{ role: 'user', content: msg }]\n          })\n        });\n        const data = await resp.json();\n        messages.innerHTML += `<div>Agent: ${data.choices[0].message.content}</div>`;\n        shareToAtom('', data.choices[0].message.content);\n      } catch (e) {\n        messages.innerHTML += '<div>Agent: API error—check key/console.</div>';\n        shareToAtom('', 'Chat error');\n      }\n      messages.scrollTop = messages.scrollHeight;\n    }\n\n    async function snap() {\n      const video = document.getElementById('video');\n      const canvas = document.createElement('canvas');\n      canvas.width = video.videoWidth;\n      canvas.height = video.videoHeight;\n      canvas.getContext('2d').drawImage(video, 0, 0);\n      const image_base64 = canvas.toDataURL('image/jpeg', 0.8);\n      const analysisEl = document.getElementById('analysis');\n      analysisEl.innerHTML = 'Analyzing...';\n      if (!apiKey) {\n        analysisEl.innerHTML = 'Stub: Calories 1800 | Posture 85/100';\n        shareToAtom(image_base64, 'Stub analysis');\n        return;\n      }\n      try {\n        const resp = await fetch('https://api.openai.com/v1/chat/completions', {\n          method: 'POST',\n          headers: {\n            'Authorization': `Bearer ${apiKey}`,\n            'Content-Type': 'application/json'\n          },\n          body: JSON.stringify({\n            model: 'gpt-4o',\n            messages: [{\n              role: 'user',\n              content: [\n                { type: 'text', text: 'Analyze health photo: calories estimate, posture score, tips.' },\n                { type: 'image_url', image_url: { url: image_base64 } }\n              ]\n            }]\n          })\n        });\n        const data = await resp.json();\n        analysisEl.innerHTML = data.choices[0].message.content;\n        shareToAtom(image_base64, data.choices[0].message.content);\n      } catch (e) {\n        analysisEl.innerHTML = 'Vision error—check key.';\n        shareToAtom(image_base64, 'Vision error');\n      }\n    }\n\n    // Ask Atom: Copy snap/chat to clipboard for OpenClaw chat\n    async function shareToAtom(imgBase64, text) {\n      const shareText = `VitalAI Update:\\n${text}\\n${imgBase64 ? 'Snap: [image attached in chat]' : 'Chat: ready'}`;\n      try {\n        await navigator.clipboard.writeText(shareText);\n        alert('✅ Copied to Atom! Paste in Telegram chat. 🌍🚀');\n      } catch {\n        prompt('Paste to Atom chat:', shareText);\n      }\n    }\n\n    // Btn event\n    document.getElementById('ask-atom').onclick = () => {\n      const analysis = document.getElementById('analysis')?.innerHTML || 'No snap yet';\n      shareToAtom('', analysis || 'VitalAI ready - snap/chat first!');\n    };\n\n    // v3.2 video/chat stubs (add your video/chat HTML here if needed)\n    console.log('VitalAI v3.2 + Ask Atom loaded!');\n  </script>\n</body>\n</html>
