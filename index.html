<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyVitalPal v3.1 - Real OpenAI Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00cc66">
  <style>
    /* v2.2 styles */
    #key-input { position: fixed; top: 10px; right: 10px; padding: 8px; border-radius: 5px; z-index: 1001; background: white; }
    .ai-status { position: fixed; top: 10px; left: 10px; background: #00cc66; color: white; padding: 5px 10px; border-radius: 20px; }
  </style>
</head>
<body>
  <!-- v2.2 nav sections cam agent HTML -->
  <input id="key-input" placeholder="sk- OpenAI key" onblur="saveKey()">
  <div id="ai-status" class="ai-status" style="display:none;">AI Ready</div>

  <script>
    let apiKey = localStorage.getItem('openai_key') || '';
    if (apiKey) {
      document.getElementById('ai-status').style.display = 'block';
    }

    function saveKey() {
      apiKey = document.getElementById('key-input').value;
      if (apiKey.startsWith('sk-')) {
        localStorage.setItem('openai_key', apiKey);
        document.getElementById('ai-status').style.display = 'block';
      }
    }

    async function sendAgent() {
      const input = document.getElementById('chat-input');
      const msg = input.value;
      const messages = document.getElementById('chat-messages');
      messages.innerHTML += `<div>You: ${msg}</div>`;
      input.value = '';
      if (!apiKey) {
        messages.innerHTML += '<div>Agent: Add key top right!</div>';
        return;
      }
      try {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [{ role: 'user', content: msg }]
          })
        });
        const data = await resp.json();
        messages.innerHTML += `<div>Agent: ${data.choices[0].message.content}</div>`;
      } catch (e) {
        messages.innerHTML += '<div>Agent: API error—check key/console.</div>';
      }
      messages.scrollTop = messages.scrollHeight;
    }

    async function snap() {
      const video = document.getElementById('video');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const image_base64 = canvas.toDataURL('image/jpeg', 0.8);
      const analysis = document.getElementById('analysis');
      analysis.innerHTML = 'Analyzing...';
      if (!apiKey) {
        analysis.innerHTML = 'Stub: Calories 1800 | Posture 85/100';
        return;
      }
      try {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'gpt-4o',
            messages: [{
              role: 'user',
              content: [
                { type: 'text', text: 'Analyze health photo: calories estimate, posture score, tips.' },
                { type: 'image_url', image_url: { url: image_base64 } }
              ]
            }]
          })
        });
        const data = await resp.json();
        analysis.innerHTML = data.choices[0].message.content;
      } catch (e) {
        analysis.innerHTML = 'Vision error—check key.';
      }
    }

    // v2.2 functions...
  </script>
</body>
</html>
